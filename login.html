<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culti — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--coral:#FF6B6B;--teal:#4ECDC4;--yellow:#FFE66D;--orange:#FB923C}
body{font-family:'Nunito',sans-serif;background:#0F1923;color:white;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:2.5rem;position:relative;z-index:1;text-decoration:none}
.logo-mark{width:44px;height:44px;background:linear-gradient(135deg,var(--coral),var(--orange));border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:24px;color:white}
.logo-name{font-family:'Fredoka One',cursive;font-size:24px;color:white}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:32px;padding:2.5rem;width:100%;max-width:420px;position:relative;z-index:1}
.card-title{font-family:'Fredoka One',cursive;font-size:26px;color:white;margin-bottom:8px}
.card-sub{font-size:15px;color:rgba(255,255,255,0.55);margin-bottom:2rem;font-weight:600;line-height:1.6}
.form-group{margin-bottom:1.25rem}
.form-label{font-size:13px;font-weight:800;color:rgba(255,255,255,0.7);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.05em}
.form-input{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:14px;padding:0.875rem 1.25rem;font-size:15px;color:white;font-family:'Nunito',sans-serif;outline:none;transition:border-color 0.2s}
.form-input::placeholder{color:rgba(255,255,255,0.3)}
.form-input:focus{border-color:var(--teal)}
.forgot{font-size:13px;color:var(--teal);text-decoration:none;font-weight:800;float:right;margin-top:-20px;margin-bottom:12px;display:block}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--coral),var(--orange));color:white;border:none;padding:1rem;border-radius:50px;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 6px 20px rgba(255,107,107,0.35);transition:transform 0.1s;margin-top:0.5rem}
.btn-primary:hover{transform:scale(1.02)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.status-msg{font-size:14px;font-weight:800;text-align:center;padding:10px 14px;border-radius:10px;margin-top:12px;display:none}
.status-msg.error{background:rgba(255,107,107,0.15);color:var(--coral);display:block}
.status-msg.success{background:rgba(78,205,196,0.15);color:var(--teal);display:block}
.center-text{text-align:center;font-size:14px;color:rgba(255,255,255,0.5);margin-top:1.5rem;font-weight:700}
.link{color:var(--teal);text-decoration:none;font-weight:800}
.link:hover{text-decoration:underline}
.reset-panel{display:none}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<a href="index.html" class="logo">
  <div class="logo-mark">C</div>
  <div class="logo-name">culti</div>
</a>

<div class="card" id="login-card">
  <div class="card-title">Content de te revoir 👋</div>
  <div class="card-sub">Connecte-toi pour retrouver ta progression, tes badges et ton arbre de vie.</div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" class="form-input" id="email" placeholder="ton@email.com">
  </div>
  <div class="form-group">
    <label class="form-label">Mot de passe</label>
    <input type="password" class="form-input" id="password" placeholder="Ton mot de passe">
    <a href="#" class="forgot" onclick="showReset(event)">Mot de passe oublié ?</a>
  </div>
  <div class="status-msg" id="login-status"></div>
  <button class="btn-primary" onclick="login()" id="btn-login">Se connecter →</button>
  <div class="center-text">Pas encore de compte ? <a href="onboarding.html" class="link">Rejoindre les Gardiens</a></div>
</div>

<div class="card reset-panel" id="reset-card">
  <div class="card-title">Réinitialiser 🔑</div>
  <div class="card-sub">Entre ton email et on t'envoie un lien pour créer un nouveau mot de passe.</div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" class="form-input" id="reset-email" placeholder="ton@email.com">
  </div>
  <div class="status-msg" id="reset-status"></div>
  <button class="btn-primary" onclick="sendReset()">Envoyer le lien →</button>
  <div class="center-text"><a href="#" class="link" onclick="showLogin(event)">← Retour à la connexion</a></div>
</div>

<script>
const SB_URL='https://zuahstlswkprzdmflekg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1YWhzdGxzd2twcnpkbWZsZWtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDU2MjMsImV4cCI6MjA5NzAyMTYyM30.-F0WRbiprAa-Zt1ih1QdsQzuuqVW2froK6Ddfvrqoik';
const {createClient}=supabase;
const sb=createClient(SB_URL,SB_KEY);

// Étoiles
(function(){const c=document.getElementById('stars');for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*4}s;`;c.appendChild(s);}})();

// Rediriger si déjà connecté
sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='profil.html';});

async function login(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const status=document.getElementById('login-status');
  const btn=document.getElementById('btn-login');
  if(!email||!password){status.textContent='Remplis tous les champs !';status.className='status-msg error';return;}
  btn.disabled=true;btn.textContent='Connexion...';
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){
    status.textContent=error.message.includes('Invalid')?'Email ou mot de passe incorrect.':'Erreur : '+error.message;
    status.className='status-msg error';
    btn.disabled=false;btn.textContent='Se connecter →';
  } else {
    status.textContent='✓ Connecté ! Redirection...';
    status.className='status-msg success';
    const redirect=new URLSearchParams(window.location.search).get('redirect')||'profil.html';
    setTimeout(()=>window.location.href=redirect,800);
  }
}

async function sendReset(){
  const email=document.getElementById('reset-email').value.trim();
  const status=document.getElementById('reset-status');
  if(!email){status.textContent='Entre ton email !';status.className='status-msg error';return;}
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/reset-password.html'});
  if(error){status.textContent='Erreur : '+error.message;status.className='status-msg error';}
  else{status.textContent='✓ Email envoyé ! Vérifie ta boîte mail.';status.className='status-msg success';}
}

function showReset(e){e.preventDefault();document.getElementById('login-card').style.display='none';document.getElementById('reset-card').style.display='block';}
function showLogin(e){e.preventDefault();document.getElementById('reset-card').style.display='none';document.getElementById('login-card').style.display='block';}
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
